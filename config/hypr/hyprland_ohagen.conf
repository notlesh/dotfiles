source = ~/.config/hypr/hyprland_common.conf

windowrule = move 4000 20%, match:class ymuse, match:title ymuse

monitor = DP-1, highres@165.057999, 0x0, 1, bitdepth, 10, vrr, 1, cm, hdr, sdrbrightness, 1.25, sdrsaturation, 1.25
monitor = DP-2, 2560x1440@120.000000, auto-center-right, 1, transform, 1, bitdepth, 10, vrr, 1

